<!DOCTYPE html>
<html>
<head>

    <div class="box">
        <label>Liver Enzyme Level</label><br>
        <input type="range" name="Alkaline_Phosphotase" min="50" max="300" step="1">
    </div>

    <div class="box">
        <label>Liver Damage Indicator (ALT)</label><br>
        <input type="range" name="Alamine_Aminotransferase" min="10" max="200" step="1">
    </div>

    <div class="box">
        <label>Liver Stress Indicator (AST)</label><br>
        <input type="range" name="Aspartate_Aminotransferase" min="10" max="200" step="1">
    </div>

    <div class="box">
        <label>Protein Level</label><br>
        <input type="range" name="Total_Protiens" min="4" max="10" step="0.1">
    </div>

    <div class="box">
        <label>Body Strength (Albumin)</label><br>
        <input type="range" name="Albumin" min="2" max="6" step="0.1">
    </div>

    <div class="box">
        <label>Protein Balance</label><br>
        <input type="range" name="Albumin_and_Globulin_Ratio" min="0.5" max="2.5" step="0.1">
    </div>

    <button type="submit">Predict</button>

</form>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Liver Prediction</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="navbar">🧬 Liver Health Check</div>

<div class="card">
<form action="/predict-liver" method="POST">

<input type="number" name="Age" placeholder="Age">

<select name="Gender">
<option value="1">Male</option>
<option value="0">Female</option>
</select>

<input name="Total_Bilirubin" placeholder="Total Bilirubin">
<input name="Direct_Bilirubin" placeholder="Direct Bilirubin">
<input name="Alkaline_Phosphotase" placeholder="Alkaline">
<input name="Alamine_Aminotransferase" placeholder="ALT">
<input name="Aspartate_Aminotransferase" placeholder="AST">
<input name="Total_Protiens" placeholder="Proteins">
<input name="Albumin" placeholder="Albumin">

<button type="submit">Predict</button>

</form>
</div>

</body>
</html>
